steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/cxas-addon-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cxas-addon-backend:latest'
      - '.'
    dir: 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cxas-addon-backend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cxas-addon-backend:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cxas-addon-backend
      - '--image=gcr.io/$PROJECT_ID/cxas-addon-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--service-account=cxas-addon-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=PROJECT_ID=$PROJECT_ID,LOCATION=us-central1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300'
      - '--max-instances=10'

images:
  - 'gcr.io/$PROJECT_ID/cxas-addon-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/cxas-addon-backend:latest'
